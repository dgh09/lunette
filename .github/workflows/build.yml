name: build-images

# Construye las imágenes de storefront y backend en la nube (los runners de
# GitHub tienen recursos de sobra) y las publica en GitHub Container Registry.
on:
  push:
    branches: [main]
    paths:
      - 'storefront/**'
      - 'backend/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Un push nuevo cancela el run anterior en curso (evita builds colgados apilados).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: storefront
            context: ./storefront
          - name: backend
            context: ./backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/lunette-${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Sin cache gha: exportar las capas grandes de Medusa a mode=max se
          # atascaba (>30 min). Un build limpio en el runner es más fiable (~5-8 min).
          provenance: false
